<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎧 Norsk lytting – synkronisert tekst</title>
<style>
  :root {
    --bg: #faf9f6;
    --card-bg: #ffffff;
    --text: #2d2d2d;
    --text-dim: #888;
    --highlight: #fff3b0;
    --highlight-border: #f0c000;
    --accent: #1a6b8a;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    padding: 24px 0 16px;
  }
  .header h1 { font-size: 1.3rem; font-weight: 600; }
  .header .date { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

  /* Player card */
  .player-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
  }

  .audio-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  audio {
    flex: 1;
    height: 40px;
  }

  .speed-btns {
    display: flex;
    gap: 4px;
  }
  .speed-btns button {
    padding: 6px 12px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .speed-btns button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .speed-btns button:hover { border-color: var(--accent); }

  .progress-bar {
    margin-top: 12px;
    height: 4px;
    background: #eee;
    border-radius: 2px;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s linear;
    width: 0%;
  }

  /* Text display */
  .text-display {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 28px;
  }

  .cue-line {
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
    font-size: 1.05rem;
  }
  .cue-line:hover {
    background: #f5f5f5;
  }
  .cue-line.active {
    background: var(--highlight);
    border-left-color: var(--highlight-border);
    font-weight: 500;
    box-shadow: 0 1px 4px rgba(240,192,0,0.15);
  }
  .cue-line.past {
    color: var(--text-dim);
  }

  .cue-index {
    display: inline-block;
    width: 28px;
    color: #bbb;
    font-size: 0.75rem;
    text-align: right;
    margin-right: 12px;
    user-select: none;
  }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .player-card, .text-display { padding: 14px; }
    .cue-line { font-size: 0.95rem; padding: 8px 10px; }
    .player-card { position: relative; top: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="title">Norsk nyheter – lytting</h1>
  <div class="date" id="date-display"></div>
</div>

<div class="player-card">
  <div class="audio-row">
    <audio id="audio" controls preload="metadata"></audio>
    <div class="speed-btns">
      <button data-rate="0.75">0.75×</button>
      <button data-rate="1" class="active">1×</button>
      <button data-rate="1.25">1.25×</button>
    </div>
  </div>
  <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
</div>

<div class="text-display" id="text-display"><p style="color:#888;font-size:0.85rem;">Laster tekst ...</p></div>

<script>

00:01:17,960 --> 00:01:30,260

00:01:31,040 --> 00:01:39,400

00:01:40,020 --> 00:01:47,940

11
00:01:49,400 --> 00:01:52,320
På den andre siden må byen tilpasse seg den nye virkeligheten.

00:01:53,120 --> 00:01:59,720
Infrastruktur som transport, toaletter og renovasjon må være tilgjengelig året rundt, ikke bare om sommeren.

00:02:00,380 --> 00:02:06,020
Kommunen må også tenke på hvordan man kan gi en god opplevelse til turister uansett årstid.

00:02:06,980 --> 00:02:13,080

00:02:13,860 --> 00:02:19,980

00:02:20,960 --> 00:02:24,900

00:02:25,780 --> 00:02:32,060
Likevel er det tydelig at Bergen fortsatt har en sterk tiltrekningskraft som cruisedestinasjon, uansett årstid.

00:02:33,580 --> 00:02:38,960
Rekordåret 2026 viser at byens popularitet bare fortsetter å vokse.

00:02:39,740 --> 00:02:42,580

00:02:43,440 --> 00:02:47,980

00:03:19,060 --> 00:03:24,880

00:04:00,380 --> 00:04:07,560

44

`;
// ========================================================

document.getElementById('title').textContent = TITLE;
document.getElementById('date-display').textContent = DATE_STR;

const audio = document.getElementById('audio');
const textDisplay = document.getElementById('text-display');
const progressFill = document.getElementById('progress-fill');
const speedBtns = document.querySelectorAll('.speed-btns button');

let cues = [];
let currentCueIdx = -1;

// --- Parse VTT (embedded data) ---
function loadVTT() {
  cues = parseVTT(VTT_DATA);
  console.log('VTT cues loaded:', cues.length);
  buildCueElements();
  // Show first cue as indicator
  if (cues.length > 0) {
    const info = document.createElement('div');
    info.style.cssText = 'font-size:0.75rem;color:#aaa;margin-bottom:8px;padding:0 14px;';
    info.textContent = cues.length + ' avsnitt lastet';
    textDisplay.insertBefore(info, textDisplay.firstChild);
  }
}

function parseVTT(raw) {
  const result = [];
  const blocks = raw.trim().split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;
    // Find the timing line: 00:00:00.000 --> 00:00:00.000
    const timeLine = lines.find(l => l.includes('-->'));
    if (!timeLine) continue;
    const times = timeLine.split('-->').map(t => parseTime(t.trim()));
    if (times.length !== 2) continue;
    const text = lines.slice(lines.indexOf(timeLine) + 1).join(' ').trim();
    if (!text) continue;
    result.push({ start: times[0], end: times[1], text });
  }
  return result;
}

function parseTime(t) {
  // HH:MM:SS.mmm or MM:SS.mmm
  const parts = t.split(':');
  let h = 0, m = 0, s = 0;
  if (parts.length === 3) {
    h = parseInt(parts[0]); m = parseInt(parts[1]); s = parseFloat(parts[2]);
  } else if (parts.length === 2) {
    m = parseInt(parts[0]); s = parseFloat(parts[1]);
  }
  return h * 3600 + m * 60 + s;
}

function buildCueElements() {
  textDisplay.innerHTML = '';
  cues.forEach((cue, i) => {
    const div = document.createElement('div');
    div.className = 'cue-line';
    div.innerHTML = `<span class="cue-index">${i + 1}</span>${cue.text}`;
    div.addEventListener('click', () => {
      audio.currentTime = cue.start;
      audio.play();
    });
    div.dataset.index = i;
    textDisplay.appendChild(div);
  });
}

// --- Sync ---
function updateActiveCue() {
  const t = audio.currentTime;
  let newIdx = -1;
  for (let i = 0; i < cues.length; i++) {
    if (t >= cues[i].start && t < cues[i].end) { newIdx = i; break; }
  }
  if (newIdx === currentCueIdx) return;
  
  // Remove old active
  if (currentCueIdx >= 0) {
    const old = textDisplay.querySelector(`[data-index="${currentCueIdx}"]`);
    if (old) {
      old.classList.remove('active');
      if (currentCueIdx < newIdx || (newIdx === -1 && t > cues[currentCueIdx].end)) {
        old.classList.add('past');
      }
    }
  }
  
  currentCueIdx = newIdx;
  if (newIdx >= 0) {
    const el = textDisplay.querySelector(`[data-index="${newIdx}"]`);
    if (el) {
      el.classList.remove('past');
      el.classList.add('active');
      // Scroll into view smoothly
      // Scroll into view (commented: causes issues in WeChat browser)
      // el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function updateProgress() {
  if (audio.duration) {
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  }
}

audio.addEventListener('timeupdate', () => {
  updateActiveCue();
  updateProgress();
});

audio.addEventListener('play', () => {
  if (cues.length > 0 && currentCueIdx < 0) updateActiveCue();
});

// --- Speed control ---
speedBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const rate = parseFloat(btn.dataset.rate);
    audio.playbackRate = rate;
    speedBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// --- Init ---
audio.src = AUDIO_URL;
try {
  loadVTT();
} catch(err) {
  textDisplay.innerHTML = `<p style="color:#c00;">⚠️ Kunne ikke laste tekst: ${err.message}</p>`;
}
</script>
</body>
</html>
