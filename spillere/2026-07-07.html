<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎧 Norsk lytting – synkronisert tekst</title>
<style>
  :root {
    --bg: #faf9f6;
    --card-bg: #ffffff;
    --text: #2d2d2d;
    --text-dim: #888;
    --highlight: #fff3b0;
    --highlight-border: #f0c000;
    --accent: #1a6b8a;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    padding: 24px 0 16px;
  }
  .header h1 { font-size: 1.3rem; font-weight: 600; }
  .header .date { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

  /* Player card */
  .player-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
  }

  .audio-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  audio {
    flex: 1;
    height: 40px;
  }

  .speed-btns {
    display: flex;
    gap: 4px;
  }
  .speed-btns button {
    padding: 6px 12px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .speed-btns button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .speed-btns button:hover { border-color: var(--accent); }

  .progress-bar {
    margin-top: 12px;
    height: 4px;
    background: #eee;
    border-radius: 2px;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s linear;
    width: 0%;
  }

  /* Text display */
  .text-display {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 28px;
  }

  .cue-line {
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
    font-size: 1.05rem;
  }
  .cue-line:hover {
    background: #f5f5f5;
  }
  .cue-line.active {
    background: var(--highlight);
    border-left-color: var(--highlight-border);
    font-weight: 500;
    box-shadow: 0 1px 4px rgba(240,192,0,0.15);
  }
  .cue-line.past {
    color: var(--text-dim);
  }

  .cue-index {
    display: inline-block;
    width: 28px;
    color: #bbb;
    font-size: 0.75rem;
    text-align: right;
    margin-right: 12px;
    user-select: none;
  }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .player-card, .text-display { padding: 14px; }
    .cue-line { font-size: 0.95rem; padding: 8px 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="title">Norsk nyheter – lytting</h1>
  <div class="date" id="date-display"></div>
</div>

<div class="player-card">
  <div class="audio-row">
    <audio id="audio" controls preload="auto"></audio>
    <div class="speed-btns">
      <button data-rate="0.75">0.75×</button>
      <button data-rate="1" class="active">1×</button>
      <button data-rate="1.25">1.25×</button>
    </div>
  </div>
  <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
</div>

<div class="text-display" id="text-display"></div>

<script>
// ============ CONFIG (replaced by generator) ============
const AUDIO_URL = '2026-07-07.mp3';
const TITLE = 'Dagens nyheter – 7. juli 2026';
const DATE_STR = '2026-07-07';
// VTT data embedded directly for single-file sharing:
const VTT_DATA = `1
00:00:02,980 --> 00:00:16,740
I dag har vi to store nyheter: en historisk fotballkveld som hele Norge kommer til å huske, og en mindre morsom nyhet om bompenger for alle som kjører bil i Vestland.

2
00:00:21,240 --> 00:00:22,840
La oss se nærmere på begge!

3
00:00:24,620 --> 00:00:32,740
Mandag kveld skjedde det noe helt spesielt i Fotball-VM 2026. Norge spilte åttedelsfinale mot Brasil – et av verdens beste fotballag.

4
00:00:34,660 --> 00:00:45,680
Over 1,2 millioner nordmenn satt foran TV-skjermen. Det de fikk se, var et norsk lag som spilte med hjerte, mot og stor tro på seg selv. Erling Braut Haaland ble den store helten.

5
00:00:47,940 --> 00:00:50,820
Han scoret begge målene da Norge vant 2–1 over Brasil.

6
00:00:53,120 --> 00:00:58,660
Det første målet kom tidlig i første omgang etter et vakkert angrep.

7
00:01:04,160 --> 00:01:10,140
Brasil utlignet like før pause, men Haaland var ikke ferdig.

8
00:01:15,180 --> 00:01:20,220
I andre omgang satte han inn vinnermålet, og Norge kunne juble for en sensasjonell seier.

9
00:01:26,080 --> 00:01:33,160
Dette er andre gang i historien at Norge slår Brasil i et VM. Forrige gang var for 28 år siden, i 1998.

10
00:01:36,700 --> 00:01:38,940
Den gangen vant Norge også 2–1.

11
00:01:44,200 --> 00:01:51,500
Mange husker fortsatt den kampen som en av Norges største fotballøyeblikk. Nå har en ny generasjon norske spillere skapt sitt eget historiske øyeblikk.

12
00:01:54,280 --> 00:01:59,980
I Bergen feiret tusenvis av mennesker seieren i sentrum. Folk sang, danset og ropte av glede.

13
00:02:02,380 --> 00:02:09,620
Noen rodde til og med i båt – en bergensk tradisjon når noe stort skjer!

14
00:02:15,620 --> 00:02:16,980
Men feiringen ble også vill.

15
00:02:17,900 --> 00:02:22,680
Flere personer måtte til legevakten i løpet av natten, ifølge NRK Vestland.

16
00:02:29,640 --> 00:02:34,700
De fleste hadde drukket for mye alkohol og trengte hjelp for småskader. Nå venter England i kvartfinalen.

17
00:02:38,900 --> 00:02:44,160
Det blir en tøff kamp – England er et av favorittlagene i turneringen.

18
00:02:44,640 --> 00:02:51,340
Men etter seieren mot Brasil tror mange at Norge kan overraske igjen. Det har blitt dyrere å kjøre bil i Vestland.

19
00:02:55,540 --> 00:03:06,600
Nye tall fra bombrikke-selskapet AutoSync viser at folk i Vestland betalte over 13 prosent mer i bompenger første halvår i 2026, sammenlignet med samme periode i fjor.

20
00:03:10,000 --> 00:03:15,440
I gjennomsnitt betalte hver bilist i Vestland 422 kroner i måneden i bompenger. Det er omtrent 50 kroner mer enn før. Det er to hovedgrunner. juli). juli). Ellevill natt: Flere til legevakten etter VM-festen. NRK Vestland. juli). Større utgifter til bompengar i Vestland fylke. NRK Vestland. Vi snakkes i morgen.
`;
// ========================================================

document.getElementById('title').textContent = TITLE;
document.getElementById('date-display').textContent = DATE_STR;

const audio = document.getElementById('audio');
const textDisplay = document.getElementById('text-display');
const progressFill = document.getElementById('progress-fill');
const speedBtns = document.querySelectorAll('.speed-btns button');

let cues = [];
let currentCueIdx = -1;

// --- Parse VTT (embedded data) ---
function loadVTT() {
  cues = parseVTT(VTT_DATA);
  buildCueElements();
}

function parseVTT(raw) {
  const result = [];
  const blocks = raw.trim().split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (lines.length < 2) continue;
    // Find the timing line: 00:00:00.000 --> 00:00:00.000
    const timeLine = lines.find(l => l.includes('-->'));
    if (!timeLine) continue;
    const times = timeLine.split('-->').map(t => parseTime(t.trim()));
    if (times.length !== 2) continue;
    const text = lines.slice(lines.indexOf(timeLine) + 1).join(' ').trim();
    if (!text) continue;
    result.push({ start: times[0], end: times[1], text });
  }
  return result;
}

function parseTime(t) {
  // HH:MM:SS.mmm or MM:SS.mmm
  const parts = t.split(':');
  let h = 0, m = 0, s = 0;
  if (parts.length === 3) {
    h = parseInt(parts[0]); m = parseInt(parts[1]); s = parseFloat(parts[2]);
  } else if (parts.length === 2) {
    m = parseInt(parts[0]); s = parseFloat(parts[1]);
  }
  return h * 3600 + m * 60 + s;
}

function buildCueElements() {
  textDisplay.innerHTML = '';
  cues.forEach((cue, i) => {
    const div = document.createElement('div');
    div.className = 'cue-line';
    div.innerHTML = `<span class="cue-index">${i + 1}</span>${cue.text}`;
    div.addEventListener('click', () => {
      audio.currentTime = cue.start;
      audio.play();
    });
    div.dataset.index = i;
    textDisplay.appendChild(div);
  });
}

// --- Sync ---
function updateActiveCue() {
  const t = audio.currentTime;
  let newIdx = -1;
  for (let i = 0; i < cues.length; i++) {
    if (t >= cues[i].start && t < cues[i].end) { newIdx = i; break; }
  }
  if (newIdx === currentCueIdx) return;
  
  // Remove old active
  if (currentCueIdx >= 0) {
    const old = textDisplay.querySelector(`[data-index="${currentCueIdx}"]`);
    if (old) {
      old.classList.remove('active');
      if (currentCueIdx < newIdx || (newIdx === -1 && t > cues[currentCueIdx].end)) {
        old.classList.add('past');
      }
    }
  }
  
  currentCueIdx = newIdx;
  if (newIdx >= 0) {
    const el = textDisplay.querySelector(`[data-index="${newIdx}"]`);
    if (el) {
      el.classList.remove('past');
      el.classList.add('active');
      // Scroll into view smoothly
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function updateProgress() {
  if (audio.duration) {
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  }
}

audio.addEventListener('timeupdate', () => {
  updateActiveCue();
  updateProgress();
});

audio.addEventListener('play', () => {
  if (cues.length > 0 && currentCueIdx < 0) updateActiveCue();
});

// --- Speed control ---
speedBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const rate = parseFloat(btn.dataset.rate);
    audio.playbackRate = rate;
    speedBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// --- Init ---
audio.src = AUDIO_URL;
try {
  loadVTT();
} catch(err) {
  textDisplay.innerHTML = `<p style="color:#c00;">⚠️ Kunne ikke laste tekst: ${err.message}</p>`;
}
</script>
</body>
</html>
