<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>挪威语新闻 · Norsk Nyheter B1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .icon { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6; }
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 12px;
    transition: background 0.2s;
  }
  .btn:hover { background: #5a6fd6; }
  .btn:active { background: #4e62c0; }
  .btn-secondary {
    background: #f0f0f5;
    color: #555;
    font-size: 14px;
  }
  .btn-secondary:hover { background: #e4e4ee; }
  .tip {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
    line-height: 1.6;
  }
  .hidden { display: none; }
  #copySuccess { color: #4caf50; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📰</div>
  <h1>挪威语新闻</h1>
  <p class="sub">Norsk Nyheter B1 · 每日更新<br>专为挪威语学习者整理的当日新闻</p>

  <a class="btn" id="openBtn" href="https://wobbly-dietician-a63.notion.site/392ce53a5a3080c684bfe3a481b1f386" target="_blank">
    打开新闻 →
  </a>

  <button class="btn btn-secondary" id="copyBtn" onclick="copyLink()">
    复制链接到浏览器打开
  </button>

  <p id="copySuccess" class="hidden">✅ 链接已复制！</p>

  <p class="tip">
    微信内打不开？点上方「复制链接」，<br>粘贴到 Safari / Chrome 打开即可。
  </p>
</div>

<script>
function copyLink() {
  const url = "https://wobbly-dietician-a63.notion.site/392ce53a5a3080c684bfe3a481b1f386";
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById('copySuccess').classList.remove('hidden');
      setTimeout(() => document.getElementById('copySuccess').classList.add('hidden'), 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('copySuccess').classList.remove('hidden');
    setTimeout(() => document.getElementById('copySuccess').classList.add('hidden'), 2000);
  }
}

// Detect WeChat and auto-show the secondary button more prominently
var ua = navigator.userAgent.toLowerCase();
if (ua.indexOf('micromessenger') !== -1) {
  document.getElementById('copyBtn').style.background = '#667eea';
  document.getElementById('copyBtn').style.color = 'white';
  document.getElementById('copyBtn').style.fontSize = '18px';
  document.getElementById('copyBtn').style.fontWeight = '600';
}
</script>
</body>
</html>
